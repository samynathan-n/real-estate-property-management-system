<template>
    <lightning-card title="Maintenance Requests" icon-name="standard:maintenance_asset">
        
        <!-- Add Button -->
        <lightning-button 
            label="New Request" 
            slot="actions" 
            onclick={handleOpenModal} 
            icon-name="utility:add">
        </lightning-button>

        <!-- List View -->
        <div style="height: 400px;" class="slds-p-around_small">
            <template if:true={requests}>
                <lightning-datatable
                    key-field="Id"
                    data={requests}
                    columns={columns}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>
        </div>

        <!-- NEW REQUEST MODAL -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Raise Maintenance Request</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- We only ask for Property and Description -->
                        <!-- Vendor is auto-assigned by your Trigger! -->
                        <lightning-record-edit-form 
                            object-api-name="Maintenance_Request__c" 
                            onsuccess={handleSuccess}
                            onerror={handleError}>
                            
                            <lightning-messages></lightning-messages>
                            
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-1 slds-p-around_x-small">
                                    <lightning-input-field field-name="Property__c" required></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-p-around_x-small">
                                    <lightning-input-field field-name="Description__c" required></lightning-input-field>
                                </div>
                                <!-- Status defaults to 'Open' -->
                                <div class="slds-col slds-size_1-of-1 slds-p-around_x-small">
                                    <lightning-input-field field-name="Status__c" value="Open"></lightning-input-field>
                                </div>
                            </div>

                            <p class="slds-p-around_x-small slds-text-color_weak slds-text-body_small">
                                * The best available vendor will be assigned automatically upon saving.
                            </p>

                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button label="Cancel" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                                <lightning-button type="submit" label="Submit Request" variant="brand"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
