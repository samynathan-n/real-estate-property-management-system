<template>
    <lightning-card title="Lease Agreements" icon-name="standard:contract">
        <lightning-button label="New Lease" slot="actions" onclick={openModal}></lightning-button>
        <div style="height: 400px;">
            <lightning-datatable key-field="Id" data={leases} columns={columns} hide-checkbox-column></lightning-datatable>
        </div>

        <template if:true={isModalOpen}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Create Lease</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form object-api-name="Lease_Agreement__c" onsuccess={handleSuccess}>
                            <lightning-messages></lightning-messages>
                            <lightning-input-field field-name="Property__c"></lightning-input-field>
                            <lightning-input-field field-name="Tenant__c"></lightning-input-field>
                            <lightning-input-field field-name="Agreed_Monthly_Rent__c"></lightning-input-field>
                            <lightning-input-field field-name="Start_Date__c"></lightning-input-field>
                            <lightning-input-field field-name="End_Date__c"></lightning-input-field>
                            <lightning-input-field field-name="Terms__c"></lightning-input-field>
                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                                <lightning-button type="submit" label="Save" variant="brand"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
