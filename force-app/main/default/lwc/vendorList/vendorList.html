<template>
    <lightning-card title="Vendor Management" icon-name="standard:groups">
        
        <!-- Add Button -->
        <lightning-button 
            label="Add Vendor" 
            slot="actions" 
            onclick={handleOpenModal} 
            icon-name="utility:add">
        </lightning-button>

        <!-- List View -->
        <div style="height: 400px;" class="slds-p-around_small">
            <template if:true={vendors}>
                <lightning-datatable
                    key-field="Id"
                    data={vendors}
                    columns={columns}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>
        </div>

        <!-- NEW VENDOR MODAL -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Register New Vendor</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Record Edit Form using Vendor__c schema -->
                        <lightning-record-edit-form 
                            object-api-name="Vendor__c" 
                            onsuccess={handleSuccess}
                            onerror={handleError}>
                            
                            <lightning-messages></lightning-messages>
                            
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-1 slds-p-around_x-small">
                                    <lightning-input-field field-name="Name" required></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <lightning-input-field field-name="Phone__c" required></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <lightning-input-field field-name="Email__c" required></lightning-input-field>
                                </div>
                            </div>

                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button label="Cancel" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                                <lightning-button type="submit" label="Create Vendor" variant="brand"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
