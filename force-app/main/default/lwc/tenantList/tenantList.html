<template>
    <lightning-card title="Tenants" icon-name="standard:contact">
        <!-- New Tenant Button -->
        <lightning-button 
            label="New Tenant" 
            slot="actions" 
            onclick={openModal}>
        </lightning-button>

        <!-- The Table -->
        <div style="height: 400px;">
            <lightning-datatable
                key-field="Id"
                data={tenants}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </div>

        <!-- CREATE TENANT MODAL -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Add New Tenant</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Standard record-edit-form based on your Phase 1 schema -->
                        <lightning-record-edit-form 
                            object-api-name="Tenant__c" 
                            onsuccess={handleSuccess}
                            onerror={handleError}>
                            
                            <lightning-messages></lightning-messages>
                            
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-1">
                                    <lightning-input-field field-name="Name" required></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input-field field-name="Phone__c"></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input-field field-name="Email__c"></lightning-input-field>
                                </div>
                            </div>

                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button class="slds-m-right_small" label="Cancel" onclick={closeModal}></lightning-button>
                                <lightning-button type="submit" label="Save Tenant" variant="brand"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
